<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: var(--vscode-font-family);
        font-size: 13px;
        background: var(--vscode-sideBar-background);
        color: var(--vscode-foreground);
      }
      .sidebar {
        padding: 12px 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        cursor: pointer;
        border-radius: 4px;
        color: var(--vscode-foreground);
      }
      .row:hover {
        background: var(--vscode-list-hoverBackground);
      }
      .row-icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--vscode-icon-foreground);
      }
      .row-icon svg {
        width: 16px;
        height: 16px;
      }
      .divider {
        height: 1px;
        background-color: var(--vscode-panel-border);
        margin: 8px 4px;
        opacity: 0.5;
      }
      .section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--vscode-sideBarTitle-foreground);
        padding: 4px 8px;
        opacity: 0.8;
        margin-top: 4px;
      }
      .recent-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .recent-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        cursor: pointer;
        border-radius: 4px;
        font-size: 13px;
        color: var(--vscode-foreground);
        white-space: nowrap;
        overflow: hidden;
      }
      .recent-item:hover,
      .recent-item.context-active {
        background: var(--vscode-list-hoverBackground);
      }
      .recent-item.focused {
        background: var(--vscode-list-activeSelectionBackground);
        color: var(--vscode-list-activeSelectionForeground);
      }
      .recent-item.focused .icon {
        opacity: 1;
        color: var(--vscode-list-activeSelectionForeground);
      }
      .recent-item .icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--vscode-icon-foreground);
        opacity: 0.8;
      }
      .recent-item .name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .empty-tip {
        padding: 8px;
        color: var(--vscode-descriptionForeground);
        font-size: 12px;
        font-style: italic;
        opacity: 0.7;
      }

      /* 右键菜单 */
      .context-menu {
        position: fixed;
        z-index: 9999;
        background: var(--vscode-menu-background);
        border: 1px solid var(--vscode-menu-border, var(--vscode-panel-border));
        border-radius: 3px;
        padding: 2px 0;
        min-width: 160px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        display: none;
      }
      .context-menu.visible {
        display: block;
      }
      .context-menu-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px;
        cursor: pointer;
        font-size: 12px;
        color: var(--vscode-menu-foreground);
        white-space: nowrap;
      }
      .context-menu-item:hover {
        background: var(--vscode-menu-selectionBackground);
        color: var(--vscode-menu-selectionForeground);
      }
      .context-menu-item:hover svg {
        color: var(--vscode-menu-selectionForeground);
      }
      .context-menu-item svg {
        width: 12px;
        height: 12px;
        flex-shrink: 0;
        color: var(--vscode-icon-foreground);
      }
      .context-menu-separator {
        height: 1px;
        background: var(
          --vscode-menu-separatorBackground,
          var(--vscode-panel-border)
        );
        margin: 2px 0;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="row" data-action="openIDE">
        <span class="row-icon">
          <svg
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M8 3v10M3 8h10" />
          </svg>
        </span>
        <span>新建 .ui 文件</span>
      </div>

      <div class="divider"></div>

      <div class="section-title">最近打开</div>
      <div class="recent-list" id="recent-list">
        <div class="empty-tip">加载中...</div>
      </div>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu" id="context-menu">
      <div class="context-menu-item" id="ctx-reveal">
        <svg
          viewBox="0 0 16 16"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path d="M1.5 2.5h5l1.5 1.5h6.5v9.5H1.5z" />
        </svg>
        在资源管理器中显示
      </div>
      <div class="context-menu-item" id="ctx-reveal-os">
        <svg
          viewBox="0 0 16 16"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path d="M2 2h12v10H2zM2 9h12M5 9V12M11 9V12M5 12h6" />
        </svg>
        在文件管理器中打开
      </div>
      <div class="context-menu-separator"></div>
      <div class="context-menu-item" id="ctx-remove">
        <svg
          viewBox="0 0 16 16"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path d="M4 4l8 8M12 4l-8 8" />
        </svg>
        从列表中移除
      </div>
    </div>

    <script>
      const vscode = acquireVsCodeApi()
      window.VS_CODE = vscode

      function openIDE() {
        vscode.postMessage({ command: 'openIDE' })
      }

      document
        .querySelectorAll('[data-action="openIDE"]')
        .forEach(function (el) {
          el.addEventListener('click', openIDE)
        })

      // 请求最近文件列表
      vscode.postMessage({ command: 'getRecentFiles' })

      let activeFilePath = null

      function setFocusedItem(filePath) {
        activeFilePath = filePath
        document.querySelectorAll('.recent-item').forEach((el) => {
          if (el.dataset.filePath === filePath) {
            el.classList.add('focused')
          } else {
            el.classList.remove('focused')
          }
        })
      }

      // 监听消息
      window.addEventListener('message', (event) => {
        const message = event.data
        switch (message.command) {
          case 'updateRecentFiles':
            renderRecentFiles(message.data)
            if (message.activeFilePath !== undefined) {
              setFocusedItem(message.activeFilePath)
            }
            break
          case 'activeFileChanged':
            setFocusedItem(message.filePath)
            break
        }
      })

      // ---- 右键菜单逻辑 ----
      const contextMenu = document.getElementById('context-menu')
      const ctxReveal = document.getElementById('ctx-reveal')
      const ctxRevealOS = document.getElementById('ctx-reveal-os')
      const ctxRemove = document.getElementById('ctx-remove')
      let ctxFilePath = null
      let ctxActiveItem = null

      function showContextMenu(x, y, filePath, item) {
        ctxFilePath = filePath
        if (ctxActiveItem) {
          ctxActiveItem.classList.remove('context-active')
        }
        ctxActiveItem = item || null
        if (ctxActiveItem) {
          ctxActiveItem.classList.add('context-active')
        }
        // 先显示再调整位置，确保能拿到尺寸
        contextMenu.classList.add('visible')
        const menuW = contextMenu.offsetWidth
        const menuH = contextMenu.offsetHeight
        const vw = window.innerWidth
        const vh = window.innerHeight
        const left = x + menuW > vw ? vw - menuW - 4 : x
        const top = y + menuH > vh ? vh - menuH - 4 : y
        contextMenu.style.left = left + 'px'
        contextMenu.style.top = top + 'px'
      }

      function hideContextMenu() {
        contextMenu.classList.remove('visible')
        ctxFilePath = null
        if (ctxActiveItem) {
          ctxActiveItem.classList.remove('context-active')
          ctxActiveItem = null
        }
      }

      ctxReveal.addEventListener('click', () => {
        if (ctxFilePath) {
          vscode.postMessage({
            command: 'revealInExplorer',
            filePath: ctxFilePath,
          })
        }
        hideContextMenu()
      })

      ctxRevealOS.addEventListener('click', () => {
        if (ctxFilePath) {
          vscode.postMessage({ command: 'revealInOS', filePath: ctxFilePath })
        }
        hideContextMenu()
      })

      ctxRemove.addEventListener('click', () => {
        if (ctxFilePath) {
          vscode.postMessage({
            command: 'removeRecentFile',
            filePath: ctxFilePath,
          })
        }
        hideContextMenu()
      })

      // 点击其他区域关闭菜单
      document.addEventListener('click', (e) => {
        if (!contextMenu.contains(e.target)) {
          hideContextMenu()
        }
      })

      // 滚动时也关闭
      document.addEventListener('scroll', hideContextMenu, true)

      function renderRecentFiles(files) {
        const container = document.getElementById('recent-list')
        container.innerHTML = ''

        if (!files || files.length === 0) {
          container.innerHTML =
            '<div class="empty-tip">暂无最近打开的文件</div>'
          return
        }

        files.forEach((filePath) => {
          const item = document.createElement('div')
          item.className = 'recent-item'

          // 获取文件名
          const separator = filePath.includes('/') ? '/' : '\\'
          const fileName = filePath.split(separator).pop()

          item.innerHTML = `
            <span class="icon">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 2.5C3 2.22386 3.22386 2 3.5 2H9.5L13.5 6V13.5C13.5 13.7761 13.2761 14 13 14H3.5C3.22386 14 3 13.7761 3 13.5V2.5Z"/>
                <path d="M9.5 2V6H13.5"/>
              </svg>
            </span>
            <span class="name" title="${filePath}">${fileName}</span>
          `

          item.dataset.filePath = filePath
          if (filePath === activeFilePath) {
            item.classList.add('focused')
          }

          item.addEventListener('click', () => {
            setFocusedItem(filePath)
            vscode.postMessage({
              command: 'openRecentFile',
              filePath: filePath,
            })
          })

          item.addEventListener('contextmenu', (e) => {
            e.preventDefault()
            showContextMenu(e.clientX, e.clientY, filePath, item)
          })

          container.appendChild(item)
        })
      }
    </script>
  </body>
</html>
